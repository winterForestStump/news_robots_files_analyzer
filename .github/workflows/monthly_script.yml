name: Monthly CrawlerAnalyzer runner

on:
  schedule:
    # Runs at 00:00 UTC on the 15th of every month
    - cron: '0 0 15 * *'
  workflow_dispatch:  # allows manual run from GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # required to push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 tqdm tabulate

      - name: Run Python script
        run: |
          python code/CrawlerAnalyzer.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git commit -m "Automated update: crawler analysis $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push